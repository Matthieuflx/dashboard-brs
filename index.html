<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard BRS</title>
  <link.css
  plugin-api.js"></script>
  https://cdn.jsdelivr.net/npm/chart.js
</head>
<body>
  <!-- BARRE DE FILTRES -->
  <div id="filters">
    <select id="f_commune"><option value="">Commune</option></select>
    <select id="f_arr"><option value="">Arrondissement</option></select>
    <select id="f_zonage"><option value="">Zonage</option></select>
    <select id="f_typo"><option value="">Typologie</option></select>
    <select id="f_operateur"><option value="">Opérateur</option></select>
    <select id="f_statut"><option value="">Statut</option></select>
    <select id="f_avanc"><option value="">Avancement</option></select>
    <button id="reset">🔄 Réinitialiser</button>
  </div>

  <div id="grid">
    <!-- Colonne gauche -->
    <div class="col-left">
      <div class="card">
        <h3>ZONAGE (répartition)</h3>
        <canvas id="pieZonage"></canvas>
      </div>
      <div class="card">
        <h3>Engagement</h3>
        <div class="kpi-grid">
          <div class="kpi"><label>Montant_FP</label><span id="fp">–</span></div>
          <div class="kpi"><label>Montant_pret_GAIA</label><span id="gaia">–</span></div>
          <div class="kpi"><label>Montant_pret_ALS</label><span id="als">–</span></div>
          <div class="kpi"><label>Montant_total_acquisition_TFC</label><span id="tfc">–</span></div>
        </div>
      </div>
    </div>

    <!-- Colonne droite -->
    <div class="col-right">
      <div class="card big-kpi">
        <h3>NOMBRE D'OPÉRATIONS</h3>
        <div id="nbOp">–</div>
      </div>

      <div class="card">
        <h3>Part de logement BRS</h3>
        <div class="kpi-grid">
          <div class="kpi"><label>Nb_logts_Total</label><span id="nbTot">–</span></div>
          <div class="kpi"><label>Part_de_logement_BRS</label><span id="partBrs">–</span></div>
          <div class="kpi"><label>Nb_BRS_classique</label><span id="brsC">–</span></div>
          <div class="kpi"><label>Nb_BRS_premium</label><span id="brsP">–</span></div>
        </div>
      </div>

      <div class="card">
        <h3>BRS par zone</h3>
        <div class="kpi-grid">
          <div class="kpi"><label>Nb_logts_BRS_zone_A</label><span id="brsA">–</span></div>
          <div class="kpi"><label>Nb_logts_BRS_zone_B1</label><span id="brsB1">–</span></div>
          <div class="kpi"><label>Nb_logements_BRS_total</label><span id="brsTot">–</span></div>
        </div>
      </div>

      <div class="card">
        <h3>Logements par zone</h3>
        <div class="kpi-grid">
          <div class="kpi"><label>Nb_de_logts_Zone_A</label><span id="zA">–</span></div>
          <div class="kpi"><label>Nb_de_logts_Zone_B1</label><span id="zB1">–</span></div>
          <div class="kpi"><label>Nb_logts_Total</label><span id="zTot">–</span></div>
        </div>
      </div>
    </div>
  </div>

  app.js
</body>
</html>
